name: Daily Oil Signal

"on":
  schedule:
    # 4:00 AM UTC = 9:30 AM IST, well after Asian/European markets open
    # Oil markets trade 23 hours/day - data available at this time
    - cron: '0 4 * * 1-5'   # Monday-Friday only
  
  workflow_dispatch: {}  # Manual trigger button on GitHub

jobs:
  oil-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Kill if hung (mobile API failures can hang)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-oil-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-oil-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser yfinance requests textblob pandas numpy
          python -m textblob.download_corpora

      - name: Run oil signal pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py run

      - name: Commit predictions back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: update oil_predictions.csv"
          file_pattern: "oil_predictions.csv polymarket_cache.json"
        continue-on-error: true  # Don't fail pipeline if commit fails

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: oil-signal-logs-${{ github.run_number }}
          path: oil_signal.log
          if-no-files-found: ignore
          retention-days: 7
